<header class="header" [class.scrolled]="isScrolled()" id="header">
  <div class="header-container">
    <a routerLink="/" class="logo">
      <img src="PetCare_logo.png" alt="PetCare" class="logo-img" />
    </a>

    <nav class="nav-desktop">
      @for (link of navLinks; track link.href) {
        <a [href]="link.href" class="nav-link" (click)="scrollTo(link.href, $event)">{{ link.label }}</a>
      }
      <a [routerLink]="petsRoute" class="nav-link nav-link-pets">🐾 Все питомцы</a>
    </nav>

    <div class="header-actions">
      @if (auth.isLoggedIn()) {
        <span class="user-name">{{ auth.currentUser()?.username }}</span>
        <button class="btn btn-secondary btn-sm" (click)="logout()">Выйти</button>
      } @else {
        <a routerLink="/login" class="btn btn-primary nav-cta">Войти</a>
      }
    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen()" aria-label="Меню">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="mobile-menu" [class.open]="isMobileMenuOpen()">
    <nav class="mobile-nav">
      @for (link of navLinks; track link.href) {
        <a [href]="link.href" class="mobile-nav-link" (click)="scrollTo(link.href, $event)">{{ link.label }}</a>
      }
      <a [routerLink]="petsRoute" class="mobile-nav-link" (click)="closeMobileMenu()">🐾 Все питомцы</a>
      @if (auth.isLoggedIn()) {
        <button class="btn btn-secondary mobile-cta" (click)="logout()">Выйти ({{ auth.currentUser()?.username }})</button>
      } @else {
        <a routerLink="/login" class="btn btn-primary mobile-cta" (click)="closeMobileMenu()">Войти</a>
      }
    </nav>
  </div>
</header>
