<section class="team section" id="team">
  <div class="container">
    <span class="section-label">Команда</span>
    <h2 class="section-title">
      Кто <span class="highlight-primary">создаёт</span> PetCare
    </h2>
    <p class="section-subtitle">
      Три человека, один проект, одна цель — помочь животным найти дом
    </p>

    <div class="team-grid">
      @for (member of members; track member.name; let i = $index) {
        <div class="team-card" [style.animation-delay]="(i * 0.2) + 's'">
          <div class="team-avatar-wrapper">
            <div class="team-avatar-ring" [style.background]="'linear-gradient(135deg, ' + member.color + ', ' + member.color + '80)'"></div>
            <img [src]="member.image" [alt]="member.name" class="team-avatar" loading="lazy" />
          </div>
          <h3 class="team-name">{{ member.name }}</h3>
          <p class="team-role" [style.color]="member.color">{{ member.role }}</p>
          <p class="team-resp">{{ member.responsibility }}</p>
        </div>
      }
    </div>
  </div>
</section>
